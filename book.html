<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Your Trip | VOYAGE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="book-page">

<h2>BOOK YOUR TRIP</h2>
<p class="subtitle">
  Fill out the form below and our experts will reach out to you.
</p>

<form id="bookingForm" class="booking-form">

  <label>Full Name :</label>
  <input type="text" id="name" placeholder="Name" required>

  <label>Travel Destination :</label>
  <select id="destination" required>
    <option value="">Select a destination</option>
    <option>Bali</option>
    <option>Paris</option>
    <option>Dubai</option>
    <option>Tokyo</option>
    <option>Singapore</option>
    <option>Mumbai</option>
    <option>New York</option>
    <option>China</option>
    <option>Switzerland</option>
    <option>Los Angeles</option>
  </select>

  <label>Phone Number :</label>
  <input type="tel" id="phone" placeholder="+91 00000-00000" required>

  <label>Email Address :</label>
  <input type="email" id="email" placeholder="name@example.com" required>

  <label>Preferred Date :</label>
  <input type="date" id="date" required>

  <label>Additional Details :</label>
  <textarea id="details" rows="4" placeholder="Tell us more about your dream trip..."></textarea>

  <button type="submit" class="confirm-btn">
    ▶ Confirm Inquiry
  </button>

</form>

<footer class="footer">
  <h3>Voyage</h3>
  <p>© 2024 Voyage Travel Co. All rights reserved</p>
  <p>Crafting unforgettable journeys worldwide</p>
</footer>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const bookingData = {
    name: document.getElementById("name").value,
    destination: document.getElementById("destination").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    date: document.getElementById("date").value,   // VERY IMPORTANT
    details: document.getElementById("details").value
  };

  fetch("http://localhost:5000/bookings", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(bookingData)
  })
  .then(response => response.json())
  .then(data => {
    alert(data.message);
    document.getElementById("bookingForm").reset();
  })
  .catch(error => {
    console.error("Error:", error);
  });
});
</script>

</body>
</html>
